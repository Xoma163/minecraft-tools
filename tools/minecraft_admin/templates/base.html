<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Minecraft Admin{% endblock %}</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0f1115;
            --panel: #171a21;
            --panel-2: #1f2430;
            --border: #2d3442;
            --text: #eef2f8;
            --muted: #9aa7bd;
            --accent: #74c0fc;
            --danger: #ff7b72;
            --ok: #7ee787;
        }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Inter, Segoe UI, Arial, sans-serif; background: linear-gradient(180deg, #0b0d12, #121722); color: var(--text); }
        a { color: inherit; }
        .container { width: min(1280px, calc(100% - 32px)); margin: 24px auto 48px; }
        h1, h2, h3, p { margin-top: 0; }
        .topbar, .hero, .panel, .asset-card, .stat-card { background: rgba(23, 26, 33, 0.95); border: 1px solid var(--border); border-radius: 18px; box-shadow: 0 14px 40px rgba(0, 0, 0, 0.24); }
        .topbar { padding: 14px 18px; display: flex; gap: 14px; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .brand { font-weight: 700; letter-spacing: .02em; }
        .nav { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav a { text-decoration: none; padding: 10px 14px; border-radius: 12px; color: var(--muted); border: 1px solid transparent; }
        .nav a.active { color: #0a1420; background: var(--accent); }
        .nav a:not(.active):hover { color: var(--text); border-color: var(--border); background: rgba(255,255,255,.04); }
        .hero { padding: 28px; margin-bottom: 24px; }
        .hero p { color: var(--muted); max-width: 900px; }
        .grid { display: grid; gap: 24px; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); }
        .stats { display: grid; gap: 18px; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); margin-bottom: 24px; }
        .stat-card { padding: 18px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .label, .muted { color: var(--muted); }
        .panel { padding: 22px; }
        .notice { margin: 0 0 24px; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); }
        .notice.ok { background: rgba(126, 231, 135, 0.12); color: var(--ok); }
        .notice.error { background: rgba(255, 123, 114, 0.12); color: #ffb4ac; }
        .button, button, .link-button { border: 0; border-radius: 12px; padding: 11px 16px; font-weight: 600; cursor: pointer; background: var(--accent); color: #0a1420; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: background-color .18s ease, color .18s ease, border-color .18s ease, transform .18s ease, box-shadow .18s ease; }
        .button:hover, button:hover, .link-button:hover { background: #91d1ff; }
        .button.secondary, .secondary-button { background: var(--panel-2); color: var(--text); border: 1px solid var(--border); }
        button.danger { background: rgba(255, 123, 114, 0.16); color: #ffb4ac; border: 1px solid rgba(255, 123, 114, 0.3); }
        button.danger:hover { background: rgba(255, 123, 114, 0.24); color: #ffd0ca; border-color: rgba(255, 123, 114, 0.45); }
        label { display: block; margin-bottom: 8px; color: var(--muted); font-size: 14px; }
        input[type="text"], input[type="file"], textarea { width: 100%; border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; background: var(--panel-2); color: var(--text); margin-bottom: 14px; font: inherit; }
        textarea { min-height: 140px; resize: vertical; }
        .panel form small { display: block; margin-bottom: 14px; color: var(--muted); }
        .empty { padding: 22px; border: 1px dashed var(--border); border-radius: 16px; color: var(--muted); }
        .preformatted { white-space: pre-wrap; line-height: 1.6; }
        .link-list { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
        @media (max-width: 760px) {
            .topbar { align-items: flex-start; flex-direction: column; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
<main class="container">
    <header class="topbar">
        <div class="brand">Minecraft Admin</div>
        <nav class="nav" aria-label="Основная навигация">
            <a href="/" class="{% if current_page == 'dashboard' %}active{% endif %}">Главная</a>
            <a href="/build" class="{% if current_page == 'build' %}active{% endif %}">Сборка</a>
            <a href="/guide" class="{% if current_page == 'guide' %}active{% endif %}">Инструкция</a>
            <a href="/assets" class="{% if current_page == 'assets' %}active{% endif %}">Ассеты</a>
        </nav>
    </header>

    {% if message %}<div class="notice ok">{{ message }}</div>{% endif %}
    {% if error %}<div class="notice error">{{ error }}</div>{% endif %}

    {% block content %}{% endblock %}
</main>
{% block scripts %}{% endblock %}
</body>
</html>
